<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
    }
    h3 { margin: 0 0 10px; font-size: 15px; }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .success { background: #d1fae5; color: #065f46; display: block !important; }
    .error { background: #fee2e2; color: #991b1b; display: block !important; }
    .loading { background: #dbeafe; color: #1e40af; display: block !important; }
  </style>
</head>
<body>
  <h3>Anki Quick Add</h3>
  <input type="text" id="word" placeholder="Enter Chinese word or phrase">
  <button id="add">Add to Anki</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
